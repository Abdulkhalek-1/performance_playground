services:
  db:
    image: postgres:18
    env_file: .env
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements,auto_explain"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "auto_explain.log_min_duration=200ms"
      - "-c"
      - "auto_explain.log_analyze=on"
      - "-c"
      - "auto_explain.log_buffers=on"
      - "-c"
      - "log_min_duration_statement=500ms"
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: ./app
    env_file: .env
    environment:
      - DJANGO_SILK=${DJANGO_SILK:-0}
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "4"]
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
    depends_on:
      db:
        condition: service_healthy

  loadgen:
    image: locustio/locust:2.32.4
    depends_on:
      - web
    environment:
      - MAX_PRODUCT_ID=${MAX_PRODUCT_ID:-100000}
      - MAX_CUSTOMER_ID=${MAX_CUSTOMER_ID:-10000}
    ports:
      - "8089:8089"
    volumes:
      - ./loadtest:/mnt/locust
      - ./docs/findings/baselines:/mnt/baselines
    command: -f /mnt/locust/locustfile.py --host http://web:8000

volumes:
  db_data:
